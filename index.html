<style>
  /* Updated Header Styles */
  header {
    background: linear-gradient(135deg, #0D1B2A 0%, #1A2E45 100%);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: 40px 5%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    position: relative;
  }

  .header-logo {
    width: 180px; /* Adjusted size for the circular logo */
    height: auto;
    flex-shrink: 0;
  }

  .header-content {
    text-align: left;
    max-width: 800px;
  }

  .header-ornament {
    font-size: 12px;
    letter-spacing: 3px;
    color: #C9A84C;
    margin-bottom: 10px;
    text-transform: uppercase;
    font-weight: bold;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    color: #E8C97A;
    margin: 0;
    line-height: 1;
  }

  header h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.8rem;
    color: #F5F0E8;
    margin-bottom: 25px;
    font-weight: 400;
  }

  .event-details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }

  .event-detail .label {
    font-size: 11px;
    color: #C9A84C;
    text-transform: uppercase;
    letter-spacing: 2px;
    display: block;
    margin-bottom: 5px;
  }

  .event-detail .value {
    font-size: 16px;
    color: #F5F0E8;
  }

  /* Responsive Fix for Mobile */
  @media (max-width: 768px) {
    header {
      flex-direction: column;
      text-align: center;
    }
    .header-content { text-align: center; }
    .event-details { grid-template-columns: 1fr; }
  }
</style>

<header>
  <img src="Final_Logo.png" alt="CACH Alumni Logo" class="header-logo">
  
  <div class="header-content">
    <div class="header-ornament">✦ CLUB DES ALUMNI DU COLLÈGE ADVENTISTE DU CAP-HAÏTIEN ✦</div>
    <h1>Reunion Day</h1>
    <h2>Alumni Reunion Day • 2026</h2>
    
    <div class="event-details">
      <div class="event-detail">
        <span class="label">DATE</span>
        <span class="value">Saturday — September 5, 2026</span>
      </div>
      <div class="event-detail">
        <span class="label">PLACE</span>
        <span class="value">9600 Royal Palm Blvd, Coral Springs, FL</span>
      </div>
      <div class="event-detail">
        <span class="label">COSTS</span>
        <span class="value">$50.00 USD per alumni</span>
      </div>
    </div>
  </div>
</header>
